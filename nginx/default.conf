server {
    listen 80;
    server_name app.localhost localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (strips /api prefix)
    location /api/ {
        proxy_pass         http://backend:3000/; # Ensure 'backend' matches the service name in docker-compose.yml
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy uploaded file requests (photos, proofs) to backend
    location /uploads/ {
        proxy_pass         http://backend:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }
}
