services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./projects.html:/usr/share/nginx/html/projects.html:ro
      - ./projects.js:/usr/share/nginx/html/projects.js:ro
      - ./staff-view.html:/usr/share/nginx/html/staff-view.html:ro
      - ./staff-view.js:/usr/share/nginx/html/staff-view.js:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./login.js:/usr/share/nginx/html/login.js:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./admin.js:/usr/share/nginx/html/admin.js:ro
      - ./skills.html:/usr/share/nginx/html/skills.html:ro
      - ./skills.js:/usr/share/nginx/html/skills.js:ro
      - ./files:/usr/share/nginx/html/files:ro
    depends_on:
      - backend
    networks:
      - stafftrack

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    volumes:
      - db_data:/data
      - ./backend/src:/app/src:ro
      - ./files:/app/files:ro
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/submissions.db
      - PORT=3000
    networks:
      - stafftrack
    restart: unless-stopped

networks:
  stafftrack:
    driver: bridge

volumes:
  db_data:
