services:
  nginx:
    image: nginx:alpine
    ports:
      - "6082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - stafftrack

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    volumes:
      - db_data:/data
      - ./backend/src:/app/src:ro
      - ./public/files:/app/files:ro
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/submissions.db
      - PORT=3000
      - AUTH_SERVICE_URL=https://appcore.beesuite.app
      - AUTH_SERVICE_ENDPOINT=/api/auth/login
      - JWT_SECRET=dev_secret_change_me_in_prod
    networks:
      - stafftrack
    restart: unless-stopped

networks:
  stafftrack:
    driver: bridge

volumes:
  db_data:
