<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Chart | StaffTrack</title>
    <!-- No specific ApexTree CSS required for basic usage, it uses inline SVG styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="full-width">
    <header class="app-header">
        <div class="header-inner">
            <div class="app-logo">
                <div class="logo-icon">📊</div>
                <h1>StaffTrack</h1>
            </div>
            <p class="app-subtitle">Organizational Structure</p>
        </div>
    </header>

    <nav class="app-nav" id="main-nav"></nav>

    <main class="main-container full-width">
        <div class="section-card">
            <div class="section-header">
                <div class="section-num blue">🌳</div>
                <div>
                    <h2 class="section-title">Org Chart</h2>
                    <p class="section-desc">Visual representation of the reporting structure</p>
                </div>
            </div>
            <div class="section-body">
                <div id="chart-container" class="orgchart-container"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/apextree"></script>
    <script src="orgchart.js"></script>
</body>

</html>
